<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>同じ位置に画像を重ねる</title>
</head>
<body>

<div style="position: relative; width: 480px; height: 374px;">
  <img src="./bg0.png" style="position: absolute; left: 0; top: 0;">
  
  <img src="./butterfly.gif" style="position: absolute; left: 150px; top: 0;">
  <img src="./butterfly.gif" style="position: absolute; left: 300px; top: 250px;">
  <img src="./butterfly.gif" style="position: absolute; left: 650px; top: 330px;">

  <div style="position: absolute; left: 20px; top: 20px; color: black; font-size: 24px; font-weight: bold;">
    おはよう
  </div>
</div>

</body>
</html>
